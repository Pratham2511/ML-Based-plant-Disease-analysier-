services:
  - type: pserv
    name: agroguard-ml
    env: docker
    plan: free
    rootDir: ml-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: /app/model
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: HF_MODEL_ID
        value: linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification

  - type: redis
    name: agroguard-redis
    ipAllowList: []
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: agroguard-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXP_MINUTES
        value: "60"
      - key: COOKIE_SECURE
        value: "true"
      - key: ML_SERVICE_URL
        fromService:
          type: pserv
          name: agroguard-ml
          property: hostport
      - key: REDIS_URL
        fromService:
          type: redis
          name: agroguard-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: agroguard-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: agroguard-db
    plan: free
    databaseName: agroguard
    user: agroguard
