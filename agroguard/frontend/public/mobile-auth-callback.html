<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroGuard Mobile Auth</title>
  </head>
  <body>
    <p>Completing secure sign-in...</p>
    <script>
      (function () {
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const queryParams = new URLSearchParams(window.location.search);
        const credential = hashParams.get('id_token') || hashParams.get('credential') || queryParams.get('id_token');

        if (!credential) {
          document.body.innerHTML = '<p>Google sign-in failed: missing token.</p>';
          return;
        }

        const deepLink = `agroguard://login-callback#credential=${encodeURIComponent(credential)}`;
        window.location.replace(deepLink);
      })();
    </script>
  </body>
</html>
